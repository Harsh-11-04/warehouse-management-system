<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 420px;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  .card {
    width: 380px;
    height: 280px;
    background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 40px rgba(99, 102, 241, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .brand h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .brand p {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 500;
  }

  .spinner-track {
    width: 200px;
    height: 3px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .spinner-fill {
    position: absolute;
    top: 0;
    left: -50%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, #6366f1, #818cf8, transparent);
    border-radius: 3px;
    animation: slide 1.5s ease-in-out infinite;
  }

  @keyframes slide {
    0%   { left: -50%; }
    100% { left: 100%; }
  }

  .status {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.45);
    font-weight: 400;
  }

  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  .error-state {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .error-state .icon {
    font-size: 32px;
  }

  .error-state p {
    color: #f87171;
    font-size: 13px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>Jattkart</h1>
      <p>Point of Sale</p>
    </div>

    <div id="loading">
      <div class="spinner-track">
        <div class="spinner-fill"></div>
      </div>
    </div>

    <p id="status" class="status">Starting system<span class="dots"></span></p>

    <div id="error" class="error-state">
      <div class="icon">⚠️</div>
      <p id="error-msg">Failed to start backend server.</p>
    </div>
  </div>
</body>
</html>
